name: Commit Tests

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches-ignore:
      - '**'

jobs:
  test-base:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync
      - name: Run base tests
        run: make test-base

  test-unit:
    needs: [test-base]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync
      - name: Install vcrpy
        run: uv pip install vcrpy
      - name: Generate all-fixtures hash
        id: fixture-hash
        run: |
          HASH=$(uv run python scripts/fixtures.py manifest)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
      - name: Cache all VCR fixtures
        id: vcr-cache
        uses: actions/cache@v4
        with:
          path: gridstatus/tests/fixtures/
          key: vcr-fixtures-all-${{ steps.fixture-hash.outputs.hash }}
          restore-keys: |
            vcr-fixtures-all-
      - name: Download all VCR fixtures from S3
        if: steps.vcr-cache.outputs.cache-hit != 'true'
        run: uv run python scripts/fixtures.py download
        continue-on-error: true
      - name: Run unit tests
        run: make test-unit
