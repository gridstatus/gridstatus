name: Tests
on: # Run on main branch pushes and pull requests.
  push:
    branches:
      - main
  pull_request:

jobs:
  test-base:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync
      - name: Run base tests
        run: make test-base

  test-iso:
    needs: [test-base]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
        iso: [aeso, caiso, ercot, isone, miso, nyiso, pjm, spp, ieso, eia, misc]
    env:
      EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
      PJM_API_KEY: ${{ secrets.PJM_API_KEY }}
      ERCOT_API_USERNAME: ${{ secrets.ERCOT_API_USERNAME }}
      ERCOT_API_PASSWORD: ${{ secrets.ERCOT_API_PASSWORD }}
      ERCOT_PUBLIC_API_SUBSCRIPTION_KEY: ${{ secrets.ERCOT_PUBLIC_API_SUBSCRIPTION_KEY }}
      ERCOT_ESR_API_SUBSCRIPTION_KEY: ${{ secrets.ERCOT_ESR_API_SUBSCRIPTION_KEY }}
      MISO_API_PRICING_SUBSCRIPTION_KEY: ${{ secrets.MISO_API_PRICING_SUBSCRIPTION_KEY }}
      MISO_API_LOAD_GENERATION_AND_INTERCHANGE_SUBSCRIPTION_KEY: ${{ secrets.MISO_API_LOAD_GENERATION_AND_INTERCHANGE_SUBSCRIPTION_KEY }}
      ISONE_API_USERNAME: ${{ secrets.ISONE_API_USERNAME }}
      ISONE_API_PASSWORD: ${{ secrets.ISONE_API_PASSWORD }}
      AESO_API_KEY: ${{ secrets.AESO_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync
      - name: Install vcrpy
        run: uv pip install vcrpy
      - name: Generate per-ISO fixture hash
        id: fixture-hash
        run: |
          HASH=$(uv run python scripts/fixtures.py manifest --iso ${{ matrix.iso }})
          echo "hash=$HASH" >> $GITHUB_OUTPUT
      - name: Get fixture cache paths
        id: fixture-paths
        run: |
          PATHS=$(uv run python scripts/fixtures.py cache-paths --iso ${{ matrix.iso }})
          echo "paths<<EOF" >> $GITHUB_OUTPUT
          echo "$PATHS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Cache VCR fixtures
        id: vcr-cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.fixture-paths.outputs.paths }}
          key: vcr-fixtures-${{ matrix.iso }}-${{ steps.fixture-hash.outputs.hash }}
          restore-keys: |
            vcr-fixtures-${{ matrix.iso }}-
      - name: Download VCR fixtures from S3
        if: steps.vcr-cache.outputs.cache-hit != 'true'
        run: uv run python scripts/fixtures.py download --iso ${{ matrix.iso }}
        continue-on-error: true
      - name: Verify fixtures present
        # Guards against silent CI success when the cache and the S3 download
        # both fail: without cassettes, record_mode=none skips every test.
        # Some cassettes are extensionless (eia uses bare `use_cassette("name")`
        # without .yaml), so count any regular file, not just *.yaml. The
        # `misc` ISO has no VCR cassettes at all — tests in that group use the
        # "Ensure at least one test passed" check as their only guardrail.
        run: |
          PATHS='${{ steps.fixture-paths.outputs.paths }}'
          TOTAL=0
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            COUNT=$(find "$p" -type f ! -name '.DS_Store' 2>/dev/null | wc -l)
            echo "  $p: $COUNT cassettes"
            TOTAL=$((TOTAL + COUNT))
          done <<< "$PATHS"
          if [ "$TOTAL" -eq 0 ] && [ "${{ matrix.iso }}" != "misc" ]; then
            echo "::error::No VCR cassettes found for ISO '${{ matrix.iso }}' — cache + S3 download both failed"
            exit 1
          fi
          echo "Total: $TOTAL cassettes"
      - name: Run ISO tests
        env:
          # Proxy for NYISO tests (NYISO blocks GitHub Actions IPs)
          HTTPS_PROXY: ${{ matrix.iso == 'nyiso' && secrets.WEBSHARE_PROXY_URL || '' }}
          HTTP_PROXY: ${{ matrix.iso == 'nyiso' && secrets.WEBSHARE_PROXY_URL || '' }}
          # Emit junit xml so the next step can confirm tests actually ran.
          PYTEST_ADDOPTS: --junitxml=pytest-results.xml
        run: make test-${{ matrix.iso }}
      - name: Ensure at least one test passed
        if: always()
        run: |
          if [ ! -f pytest-results.xml ]; then
            echo "::error::pytest-results.xml not found — test step did not produce results"
            exit 1
          fi
          PASSED=$(python -c 'import sys, xml.etree.ElementTree as ET; r=ET.parse("pytest-results.xml").getroot(); s=r.findall(".//testsuite") or [r]; print(sum(int(x.get("tests",0)) for x in s) - sum(int(x.get("skipped",0)) for x in s) - sum(int(x.get("failures",0)) for x in s) - sum(int(x.get("errors",0)) for x in s))')
          if [ "$PASSED" -eq 0 ]; then
            echo "::error::Zero tests passed for ISO '${{ matrix.iso }}' — likely fixture or config issue"
            exit 1
          fi
          echo "$PASSED tests passed"


# test-all-coverage runs in .github/workflows/tests-nightly.yaml on a daily
# cron schedule, not on every PR. It runs the live integration suite which
# is too slow and too flaky to gate per-PR.
