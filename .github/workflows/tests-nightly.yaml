name: Nightly Tests (Live Integration)

# Runs the full live-integration test suite with coverage once per day at
# midnight UTC. This was previously the test-all-coverage job in
# tests-pr.yaml but it's too slow and depends on too many flaky live ISO
# APIs to be a per-PR gate. Failures here are signal for follow-up tickets,
# not blockers for individual PRs.
#
# Can also be triggered manually via the Actions tab (workflow_dispatch).

on:
  schedule:
    # 00:00 UTC daily
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  test-all-coverage:
    runs-on: ubuntu-latest
    env:
      EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
      PJM_API_KEY: ${{ secrets.PJM_API_KEY }}
      ERCOT_API_USERNAME: ${{ secrets.ERCOT_API_USERNAME }}
      ERCOT_API_PASSWORD: ${{ secrets.ERCOT_API_PASSWORD }}
      ERCOT_PUBLIC_API_SUBSCRIPTION_KEY: ${{ secrets.ERCOT_PUBLIC_API_SUBSCRIPTION_KEY }}
      ERCOT_ESR_API_SUBSCRIPTION_KEY: ${{ secrets.ERCOT_ESR_API_SUBSCRIPTION_KEY }}
      ISONE_API_USERNAME: ${{ secrets.ISONE_API_USERNAME }}
      ISONE_API_PASSWORD: ${{ secrets.ISONE_API_PASSWORD }}
      MISO_API_PRICING_SUBSCRIPTION_KEY: ${{ secrets.MISO_API_PRICING_SUBSCRIPTION_KEY }}
      MISO_API_LOAD_GENERATION_AND_INTERCHANGE_SUBSCRIPTION_KEY: ${{ secrets.MISO_API_LOAD_GENERATION_AND_INTERCHANGE_SUBSCRIPTION_KEY }}
      AESO_API_KEY: ${{ secrets.AESO_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync
      - name: Install vcrpy
        run: uv pip install --no-deps vcrpy pytest-cov
      - name: Generate all-fixtures hash
        id: fixture-hash
        run: |
          HASH=$(uv run python scripts/fixtures.py manifest)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
      - name: Cache all VCR fixtures
        id: vcr-cache
        uses: actions/cache@v4
        with:
          path: gridstatus/tests/fixtures/
          key: vcr-fixtures-all-${{ steps.fixture-hash.outputs.hash }}
          restore-keys: |
            vcr-fixtures-all-
      - name: Download all VCR fixtures from S3
        if: steps.vcr-cache.outputs.cache-hit != 'true'
        run: uv run python scripts/fixtures.py download
        continue-on-error: true
      - name: Run all tests with coverage
        env:
          # Proxy for NYISO tests (NYISO blocks GitHub Actions IPs)
          HTTPS_PROXY: ${{ secrets.WEBSHARE_PROXY_URL }}
          HTTP_PROXY: ${{ secrets.WEBSHARE_PROXY_URL }}
        run: make test-cov
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ${{ github.workspace }}/coverage.xml
          fail_ci_if_error: false
          verbose: true
